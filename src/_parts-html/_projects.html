<section class="project" id="Projects">
  <h2 class="visually-hidden" data-i18n="project__section-title">Projects</h2>
  <div class="container project__container">
    <article class="project__desc">
      <h2 class="project__title" data-i18n="project-title">Мои работы.</h2>
      <p class="project__desc-text" data-i18n="project-text">
        Здесь вы можете ознакомиться с некоторыми из моих работ.
      </p>
    </article>
    <article class="project__slider">
      <h2 class="visually-hidden" data-i18n="project__slider-title">
        Примеры работ
      </h2>
      <div class="project__slider-viewport" aria-live="polite">
        <div class="project__slider-track">
          <div class="project__slider-item">
            <img
              src="images/architecture-img.webp"
              alt="Макет архитектурного бюро Architecture - десктопная версия."
              data-i18n-alt="project-arch-alt"
              width="960"
              height="540"
              loading="lazy"
            />
          </div>

          <div class="project__slider-item">
            <img
              src="images/mob-architect.webp"
              alt="Адаптивная мобильная версия сайта Architecture."
              data-i18n-alt="project-mobArch-alt"
              width="960"
              height="540"
              loading="lazy"
            />

            <div class="project__slider-links">
              <a
                href="https://github.com/Qooler-667/Architecture.git"
                class="project__link"
                target="_blank"
                rel="noopener noreferrer"
                >GitHub</a
              >
              <a
                href="https://qooler-667.github.io/Architecture/"
                class="project__link"
                target="_blank"
                rel="noopener noreferrer"
                >Demo</a
              >
            </div>
          </div>

          <div class="project__slider-item">
            <img
              src="images/coffee-img.webp"
              alt="Дизайн сайта кофейни Bean Scene."
              data-i18n-alt="project-coffee-alt"
              width="960"
              height="540"
              loading="lazy"
            />
          </div>
          <div class="project__slider-item">
            <img
              src="images/mob-coffee.webp"
              alt="Мобильная версия сайта Bean Scene."
              data-i18n-alt="project-mobCoffee-alt"
              width="960"
              height="540"
              loading="lazy"
            />

            <div class="project__slider-links">
              <a
                href="https://github.com/Qooler-667/Bean-Scene.git"
                class="project__link"
                target="_blank"
                rel="noopener noreferrer"
                >GitHub</a
              >
              <a
                href=" https://qooler-667.github.io/Bean-Scene/"
                class="project__link"
                target="_blank"
                rel="noopener noreferrer"
                >Demo</a
              >
            </div>
          </div>
        </div>
      </div>
      <div class="project__slider-btns">
        <button
          class="slider__btn prev-btn"
          aria-label="Предыдущий слайд"
          data-i18n-aria="project-prev-btn"
        >
          <svg class="slider__btn-icon" aria-hidden="true">
            <use href="images/icons/stack.svg#left-arrow"></use>
          </svg>
        </button>
        <button
          class="slider__btn next-btn"
          aria-label="Следующий слайд"
          data-i18n-aria="project-next-btn"
        >
          <svg class="slider__btn-icon" aria-hidden="true">
            <use href="images/icons/stack.svg#right-arrow"></use>
          </svg>
        </button>
      </div>
    </article>
  </div>
</section>
